<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海挑战 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #020509; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; position: fixed; width: 100%; }
        #gc { position: relative; width: 100%; height: 100%; background: #050a12; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 顶部 UI */
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; pointer-events: none; z-index: 10; transition: 0.3s; }
        .stat { background: rgba(0, 136, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 20px; padding: 6px 15px; font-size: 11px; color: #4db8ff; }
        .stat span { color: #fff; font-weight: bold; margin-left: 4px; font-size: 14px; }

        /* 主菜单 */
        #menu { position: absolute; inset: 0; background: rgba(3,8,16,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(15px); }
        #menu h1 { font-size: 40px; margin-bottom: 40px; text-shadow: 0 0 20px #0088ff; font-style: italic; }
        .mode-btn { width: 220px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,136,255,0.5); padding: 20px; border-radius: 15px; margin: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .mode-btn:active { transform: scale(0.95); background: rgba(0,136,255,0.2); }
        .mode-btn h3 { font-size: 20px; color: #fff; margin-bottom: 5px; }
        .mode-btn p { font-size: 12px; color: #7aafd4; }

        /* 游戏结束/过关 弹窗 */
        #msg { position: absolute; inset: 0; background: rgba(3,8,16,0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; text-align: center; }
        #msg h2 { font-size: 30px; margin-bottom: 10px; }
        #msg button { background: #0088ff; color: #fff; border: none; border-radius: 30px; padding: 15px 60px; font-size: 16px; font-weight: bold; margin-top: 25px; }
        
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: rgba(77,184,255,0.3); font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>
<div id="gc">
    <div id="menu">
        <h1>SHARK ⚡️ DASH</h1>
        <div class="mode-btn" onclick="startMode('endless')">
            <h3>无尽模式</h3>
            <p>无限深渊，挑战最高纪录</p >
        </div>
        <div class="mode-btn" onclick="startMode('challenge')">
            <h3>挑战模式</h3>
            <p id="challenge-info">共40关 · 当前第 1 关</p >
        </div>
    </div>

    <div id="ui" style="opacity: 0;">
        <div class="stat"><span id="mode-label">ENDLESS</span></div>
        <div class="stat">SCORE <span id="sc">0</span></div>
        <div class="stat">BEST <span id="bs">0</span></div>
    </div>

    <canvas id="cv"></canvas>

    <div id="msg">
        <h2 id="mt">SHARK LOST</h2>
        <p id="mb">深海中潜伏着危险...</p >
        <button id="msg-btn" onclick="handleMsgBtn()">继续</button>
        <button style="background:transparent; border:1px solid #444; margin-top:10px;" onclick="location.reload()">返回主菜单</button>
    </div>
    
    <div id="hint">点触起跳 · 闪电冲刺</div>
</div>

<script>
/**
 * ⚡️ 闪电鲨 v12 核心代码库
 */
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg'), mt = document.getElementById('mt'), mb = document.getElementById('mb');

// 游戏状态
let W, H, time = 0, gameState = 'menu', gameMode = 'endless';
let score = 0, best = 0, currentLevel = 1, targetScore = 0;
let holding = false, holdStart = 0;
let tanks = [], shark, particles = [], camX = 0, targetCamX = 0;

// 场景配置
const THEMES = [
    { range: [1, 10], bg: ['#020509', '#081326'], water: '#00ccff', name: '深海' },
    { range: [11, 20], bg: ['#010c0b', '#052a26'], water: '#00ffaa', name: '碧波' },
    { range: [21, 30], bg: ['#0d0212', '#2a053d'], water: '#bb66ff', name: '暮色' },
    { range: [31, 40], bg: ['#120202', '#3d0505'], water: '#ff4400', name: '熔岩' }
];

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSfx(f1, f2, dur) {
    if(!audioCtx) audioCtx = new AudioCtx();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

// 获取当前关卡/模式的主题
function getTheme() {
    const lv = gameMode === 'endless' ? 1 : currentLevel;
    return THEMES.find(t => lv >= t.range[0] && lv <= t.range[1]) || THEMES[0];
}

function makeTank(x) {
    const theme = getTheme();
    // 挑战模式：难度随关卡增加
    let baseW = W * 0.24, baseH = H * 0.12;
    if(gameMode === 'challenge') {
        baseW -= (currentLevel * 1.5); // 关卡越高 鱼缸越窄
    }
    return { x, y: H - baseH - 120, w: Math.max(baseW, 40), h: baseH, color: theme.water, offset: Math.random()*20 };
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    let minGap = W * 0.35, maxGap = W * 0.55;
    
    if(gameMode === 'challenge') {
        minGap += (currentLevel * 2); 
        maxGap += (currentLevel * 3);
    }
    const gap = minGap + Math.random() * (maxGap - minGap);
    tanks.push(makeTank(last.x + last.w + gap));
}

function startMode(mode) {
    gameMode = mode;
    gameState = 'playing';
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui').style.opacity = '1';
    document.getElementById('mode-label').textContent = mode.toUpperCase();
    
    if(mode === 'challenge') {
        currentLevel = parseInt(localStorage.getItem('shark_level')) || 1;
        targetScore = 3 + Math.floor(currentLevel/2); // 每关需要跳过的缸数
    }
    initGame();
}

function initGame() {
    score = 0; scEl.textContent = score;
    tanks = [makeTank(W * 0.1)];
    for(let i=0; i<5; i++) spawnNext();
    shark = { x: tanks[0].x + tanks[0].w/2, y: tanks[0].y - 12, vx: 0, vy: 0, angle: 0, tail: 0 };
    camX = 0; targetCamX = 0; particles = [];
    msg.style.display = 'none';
}

function handleMsgBtn() {
    if(mt.textContent === 'LEVEL CLEAR') {
        currentLevel++;
        localStorage.setItem('shark_level', currentLevel);
        startMode('challenge');
    } else {
        initGame();
        gameState = 'playing';
    }
}

function drawShark(x, y, ang, tail, isIdle) {
    cx.save();
    const swim = isIdle ? Math.sin(time*0.1)*4 : 0;
    cx.translate(x, y + swim); cx.rotate(ang);
    const theme = getTheme();
    const g = cx.createLinearGradient(-18, 0, 18, 0);
    g.addColorStop(0, '#1a75ff'); g.addColorStop(1, '#80b3ff');
    cx.fillStyle = g; cx.shadowBlur = 15; cx.shadowColor = theme.water;
    cx.beginPath(); cx.ellipse(0, 0, 20, 9, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.moveTo(-4, -7); cx.quadraticCurveTo(2, -15, 9, -5); cx.fill();
    const tw = Math.sin(tail) * 5;
    cx.beginPath(); cx.moveTo(-16, 0); cx.lineTo(-28, -9+tw); cx.lineTo(-24, 0); cx.lineTo(-28, 9+tw); cx.fill();
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(11, -2, 2, 0, Math.PI*2); cx.fill();
    cx.restore();
}

function draw() {
    time++;
    const theme = getTheme();
    
    // 背景渐变
    const bgGrd = cx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0, theme.bg[0]); bgGrd.addColorStop(1, theme.bg[1]);
    cx.fillStyle = bgGrd; cx.fillRect(0,0,W,H);
    
    if(gameState === 'playing') {
        if(shark.vx !== 0 || shark.vy !== 0) { // 飞行中
            shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.48;
            shark.angle = Math.atan2(shark.vy, shark.vx);
            shark.tail += 0.4;
            targetCamX = Math.max(camX, shark.x - W * 0.3);

            tanks.forEach((t, i) => {
                if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y-10 && shark.y < t.y+30) {
                    playSfx(150, 80, 0.3);
                    for(let k=0; k<8; k++) particles.push({x:shark.x, y:t.y, vx:(Math.random()-0.5)*5, vy:-Math.random()*4, o:1});
                    shark.y = t.y - 12; shark.vx = 0; shark.vy = 0; shark.angle = 0;
                    
                    if(i > 0) {
                        score += i; scEl.textContent = score;
                        if(gameMode === 'endless') {
                            if(score > best) { best=score; bsEl.textContent=best; localStorage.setItem('shark_best', best); }
                        } else if(score >= targetScore) { // 挑战模式 过关
                            gameState = 'win';
                            mt.textContent = 'LEVEL CLEAR';
                            mb.textContent = `第 ${currentLevel} 关挑战成功！\n下一关难度将提升。`;
                            document.getElementById('msg-btn').textContent = '下一关';
                            msg.style.display = 'flex';
                        }
                        tanks.splice(0, i); while(tanks.length<6) spawnNext();
                    }
                }
            });
            if(shark.y > H + 100 || shark.x < camX - 100) {
                gameState = 'dead';
                mt.textContent = 'SHARK LOST';
                mb.textContent = gameMode === 'challenge' ? `在第 ${currentLevel} 关折羽沉沙...` : `深海迷航，本次得分 ${score}`;
                document.getElementById('msg-btn').textContent = '重试';
                msg.style.display = 'flex';
            }
        } else { shark.tail += 0.06; }
    }
    
    camX += (targetCamX - camX) * 0.1;
    cx.save(); cx.translate(-camX, 0);
    
    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 3; cx.shadowBlur = 15; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.save(); cx.beginPath(); cx.rect(t.x, t.y, t.w, t.h); cx.clip();
        cx.fillStyle = 'rgba(255,255,255,0.1)';
        cx.beginPath(); cx.moveTo(t.x, t.y + t.h);
        for(let tx=0; tx<=t.w; tx+=5) {
            const ty = Math.sin(tx*0.06 + time*0.05 + t.offset) * 3;
            cx.lineTo(t.x + tx, t.y + 10 + ty);
        }
        cx.lineTo(t.x+t.w, t.y+t.h); cx.fill();
        cx.restore();
    });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.o -= 0.02;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2, 0, Math.PI*2); cx.fill();
    });
    
    drawShark(shark.x, shark.y, shark.angle, shark.tail, shark.vx===0);
    cx.restore();

    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        cx.fillStyle = theme.water; cx.fillRect(0, H-5, W*p, 5);
    }
    requestAnimationFrame(draw);
}

const startHold = (e) => {
    if(e.type==='touchstart') e.preventDefault();
    if(gameState === 'playing' && shark.vx === 0) { holding = true; holdStart = Date.now(); }
};
const endHold = () => {
    if(holding) {
        holding = false; playSfx(200, 500, 0.2);
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        shark.vx = W*0.015 + p * (W*0.038);
        shark.vy = -H*0.012 - p * (H*0.022);
    }
};

cv.addEventListener('touchstart', startHold, {passive:false});
window.addEventListener('touchend', endHold);
cv.addEventListener('mousedown', startHold);
window.addEventListener('mouseup', endHold);

// 初始化数据显示
best = localStorage.getItem('shark_best') || 0; bsEl.textContent = best;
const savedLevel = localStorage.getItem('shark_level') || 1;
document.getElementById('challenge-info').textContent = `共40关 · 当前第 ${savedLevel} 关`;

draw();
</script>
</body>
</html>
