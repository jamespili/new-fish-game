<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海挑战 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #010408; height: 100vh; overflow: hidden; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif; color: #fff; position: fixed; width: 100%; }
        
        #gc { position: relative; width: 100%; height: 100%; background: radial-gradient(circle at center, #081221 0%, #030812 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 顶部 UI 加强 */
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 10px; pointer-events: none; z-index: 10; opacity: 0; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat { background: rgba(0, 136, 255, 0.12); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 25px; padding: 7px 18px; font-size: 11px; color: #4db8ff; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .stat span { color: #fff; font-weight: 700; margin-left: 5px; font-size: 16px; }
        
        #music-toggle { pointer-events: all; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        #music-toggle:active { transform: scale(0.9); background: rgba(0, 136, 255, 0.3); }

        /* 主菜单优化 - 科技感 */
        #menu { position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(8, 20, 45, 0.95) 0%, rgba(2, 5, 12, 1) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #menu.hide { opacity: 0; transform: scale(1.1); pointer-events: none; }
        
        #menu h1 { font-size: 42px; margin-bottom: 5px; text-shadow: 0 0 30px rgba(0, 136, 255, 0.8); font-style: italic; font-weight: 900; letter-spacing: 4px; color: #fff; }
        #menu .subtitle { font-size: 12px; color: #4db8ff; letter-spacing: 6px; margin-bottom: 50px; text-transform: uppercase; opacity: 0.8; }

        .mode-btn { width: 260px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,136,255,0.3); padding: 22px 30px; border-radius: 20px; margin: 12px; position: relative; overflow: hidden; transition: 0.3s; }
        .mode-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: 0.5s; }
        .mode-btn:active { background: rgba(0,136,255,0.15); border-color: #0088ff; transform: translateY(2px); }
        .mode-btn:active::before { left: 100%; }
        
        .mode-btn h3 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .mode-btn p { font-size: 11px; color: #7aafd4; font-weight: 400; }

        /* 游戏结算 */
        #msg { position: absolute; inset: 0; background: rgba(2, 5, 12, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; text-align: center; backdrop-filter: blur(20px); }
        #msg h2 { font-size: 34px; margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to bottom, #fff, #0088ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #msg p { color: #7aafd4; font-size: 15px; margin-bottom: 40px; }
        #msg button { background: linear-gradient(135deg, #0088ff 0%, #0044bb 100%); color: #fff; border: none; border-radius: 40px; padding: 18px 80px; font-size: 18px; font-weight: 800; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(0, 136, 255, 0.4); }
        
        #hint { position: absolute; bottom: 50px; width: 100%; text-align: center; color: rgba(77,184,255,0.25); font-size: 11px; letter-spacing: 3px; font-weight: 300; }
    </style>
</head>
<body>
<div id="gc">
    <div id="menu">
        <h1>SHARK ⚡️ DASH</h1>
        <div class="subtitle">Deep Sea Adventure</div>
        
        <div class="mode-btn" onclick="startMode('endless')">
            <h3>∞ 无尽模式</h3>
            <p>探索深海极致纪录</p>
        </div>
        
        <div class="mode-btn" onclick="startMode('challenge')">
            <h3>🏁 挑战模式</h3>
            <p id="challenge-info">加载关卡进度...</p>
        </div>

        <div style="position: absolute; bottom: 40px; font-size: 10px; color: #334e6e;">VER 1.16 ⚡️ STABLE</div>
    </div>

    <div id="ui">
        <div id="music-toggle" onclick="toggleMusic()">🔊</div>
        <div class="stat"><span id="mode-label">ENDLESS</span></div>
        <div class="stat">DEPTH<span id="sc">0</span></div>
        <div class="stat">BEST<span id="bs">0</span></div>
    </div>

    <canvas id="cv"></canvas>

    <div id="msg">
        <h2 id="mt">SHARK LOST</h2>
        <p id="mb">迷失在深渊...</p>
        <button onclick="handleMsgBtn()">继续挑战</button>
        <div style="margin-top: 30px; font-size: 14px; color: #444; text-decoration: underline;" onclick="location.reload()">返回菜单</div>
    </div>
    
    <div id="hint">点触起跳 · 长按蓄力冲刺</div>
</div>

<script>
/**
 * ⚡️ 闪电鲨 v1.16 最终精致版
 */
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg'), mt = document.getElementById('mt'), mb = document.getElementById('mb');

let W, H, time = 0, gameState = 'menu', gameMode = 'endless';
let score = 0, best = 0, currentLevel = 1, targetScore = 0;
let holding = false, holdStart = 0;
let tanks = [], shark, particles = [], menuStars = [], camX = 0, targetCamX = 0;

// 初始化音频
let audioCtx, musicGain, isMusicOn = true;
function initAudio() {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        musicGain = audioCtx.createGain();
        musicGain.gain.value = 0.12;
        musicGain.connect(audioCtx.destination);
        startBgm();
    }
}

function startBgm() {
    const osc = audioCtx.createOscillator();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(55, audioCtx.currentTime);
    lfo.frequency.value = 0.4;
    lfoGain.gain.value = 8;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(musicGain);
    lfo.start(); osc.start();
}

function toggleMusic() {
    isMusicOn = !isMusicOn;
    document.getElementById('music-toggle').textContent = isMusicOn ? '🔊' : '🔇';
    if(musicGain) musicGain.gain.setTargetAtTime(isMusicOn ? 0.12 : 0, audioCtx.currentTime, 0.1);
}

function playSfx(f1, f2, d, g=0.1) {
    if(!audioCtx || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + d);
    gain.gain.setValueAtTime(g, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + d);
    osc.start(); osc.stop(audioCtx.currentTime + d);
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

// 主菜单星星背景
for(let i=0; i<40; i++) menuStars.push({ x: Math.random()*W, y: Math.random()*H, s: 0.2+Math.random()*0.5, o: Math.random() });

const THEMES = [
    { r: [1, 10], bg: ['#020509', '#081326'], water: '#00ccff' },
    { r: [11, 20], bg: ['#010c0b', '#052a26'], water: '#00ffaa' },
    { r: [21, 30], bg: ['#0d0212', '#2a053d'], water: '#bb66ff' },
    { r: [31, 40], bg: ['#120202', '#3d0505'], water: '#ff4400' }
];

function getTheme() {
    const lv = gameMode === 'challenge' ? currentLevel : 1;
    return THEMES.find(t => lv >= t.r[0] && lv <= t.r[1]) || THEMES[0];
}

function makeTank(x) {
    const theme = getTheme();
    let baseW = W * 0.24, baseH = H * 0.12;
    if(gameMode === 'challenge') baseW -= Math.min(currentLevel * 1.5, baseW * 0.4);
    return { x, y: H - baseH - 120, w: Math.max(baseW, 55), h: baseH, color: theme.water, offset: Math.random()*50 };
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    let minG = W * 0.38, maxG = W * 0.55;
    if(gameMode === 'challenge') {
        minG += Math.min(currentLevel * 2, W * 0.2);
        maxG += Math.min(currentLevel * 3, W * 0.25);
    }
    const gap = minG + Math.random() * (maxG - minG);
    tanks.push(makeTank(last.x + last.w + gap));
}

function startMode(mode) {
    initAudio();
    gameMode = mode;
    document.getElementById('menu').classList.add('hide');
    setTimeout(() => {
        document.getElementById('ui').style.opacity = '1';
        document.getElementById('mode-label').textContent = mode === 'endless' ? 'ENDLESS' : `STAGE ${currentLevel}`;
    }, 400);

    if(mode === 'challenge') {
        currentLevel = parseInt(localStorage.getItem('shark_level')) || 1;
        targetScore = 3 + Math.floor(currentLevel/2);
    } else {
        best = localStorage.getItem('shark_best') || 0;
        bsEl.textContent = best;
    }
    gameState = 'playing';
    initGame();
}

function initGame() {
    score = 0; scEl.textContent = 0;
    tanks = [makeTank(W * 0.12)];
    for(let i=0; i<5; i++) spawnNext();
    shark = { x: tanks[0].x + tanks[0].w/2, y: tanks[0].y - 12, vx: 0, vy: 0, angle: 0, tail: 0 };
    camX = 0; targetCamX = 0; particles = [];
    msg.style.display = 'none';
}

function handleMsgBtn() {
    if(mt.textContent === 'LEVEL CLEAR') {
        currentLevel++; localStorage.setItem('shark_level', currentLevel);
        startMode('challenge');
    } else {
        initGame(); gameState = 'playing';
    }
}

function drawShark(x, y, ang, tail, isIdle) {
    cx.save();
    const swim = isIdle ? Math.sin(time*0.1)*3.5 : 0;
    cx.translate(x, y + swim); cx.rotate(ang);
    const theme = getTheme();
    cx.fillStyle = '#1a75ff'; cx.shadowBlur = 20; cx.shadowColor = theme.water;
    cx.beginPath(); cx.ellipse(0, 0, 22, 10, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.moveTo(-2, -8); cx.quadraticCurveTo(3, -16, 11, -5); cx.fill();
    const tw = Math.sin(tail) * 5;
    cx.beginPath(); cx.moveTo(-16, 0); cx.lineTo(-28, -9+tw); cx.lineTo(-24, 0); cx.lineTo(-28, 9+tw); cx.fill();
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(11, -2, 2, 0, Math.PI*2); cx.fill();
    cx.restore();
}

function draw() {
    time++;
    const theme = getTheme();
    
    // 背景
    const bgGrd = cx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0, theme.bg[0]); bgGrd.addColorStop(1, theme.bg[1]);
    cx.fillStyle = bgGrd; cx.fillRect(0,0,W,H);

    // 菜单状态下的星星
    if(gameState === 'menu') {
        menuStars.forEach(s => {
            s.y -= s.s; if(s.y < -10) s.y = H + 10;
            cx.fillStyle = `rgba(160, 210, 255, ${s.o * Math.sin(time*0.05)})`;
            cx.beginPath(); cx.arc(s.x, s.y, 1, 0, Math.PI*2); cx.fill();
        });
    }
    
    if(gameState === 'playing') {
        if(shark.vx !== 0 || shark.vy !== 0) {
            shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.52;
            shark.angle = Math.atan2(shark.vy, shark.vx);
            shark.tail += 0.45;
            targetCamX = Math.max(camX, shark.x - W * 0.35);

            tanks.forEach((t, i) => {
                if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y-10 && shark.y < t.y+30) {
                    playSfx(160, 80, 0.2, 0.3);
                    for(let k=0; k<12; k++) particles.push({x:shark.x, y:t.y, vx:(Math.random()-0.5)*5, vy:-Math.random()*4, o:1});
                    shark.y = t.y - 12; shark.vx = 0; shark.vy = 0; shark.angle = 0;
                    if(i > 0) {
                        score += i; scEl.textContent = score;
                        if(gameMode === 'endless') {
                            if(score > best) { best=score; bsEl.textContent=best; localStorage.setItem('shark_best', best); }
                        } else if(score >= targetScore) {
                            gameState = 'win'; mt.textContent = 'LEVEL CLEAR'; mb.textContent = `成功突破第 ${currentLevel} 海域！`; msg.style.display = 'flex';
                        }
                        tanks.splice(0, i); while(tanks.length<6) spawnNext();
                    }
                }
            });
            if(shark.y > H + 80 || shark.x < camX - 120) {
                gameState = 'dead'; mt.textContent = 'SHARK LOST'; mb.textContent = `在深海 ${score}m 处迷航...`; msg.style.display = 'flex';
            }
        } else { shark.tail += 0.08; }
        camX += (targetCamX - camX) * 0.1;
    }

    cx.save(); cx.translate(-camX, 0);
    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 3; cx.shadowBlur = 12; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.save(); cx.beginPath(); cx.rect(t.x, t.y, t.w, t.h); cx.clip();
        cx.fillStyle = 'rgba(255,255,255,0.1)';
        cx.beginPath(); cx.moveTo(t.x, t.y + t.h);
        for(let tx=0; tx<=t.w; tx+=6) {
            const ty = Math.sin(tx*0.06 + time*0.06 + t.offset) * 4;
            cx.lineTo(t.x + tx, t.y + 10 + ty);
        }
        cx.lineTo(t.x+t.w, t.y+t.h); cx.fill();
        cx.restore();
    });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.o -= 0.025;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2.5, 0, Math.PI*2); cx.fill();
    });
    if(shark && gameState !== 'menu') drawShark(shark.x, shark.y, shark.angle, shark.tail, shark.vx===0);
    cx.restore();

    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        cx.fillStyle = theme.water; cx.shadowBlur = 10; cx.shadowColor = theme.water;
        cx.fillRect(0, H-5, W*p, 5);
    }
    requestAnimationFrame(draw);
}

const sHold = (e) => {
    if(e.type==='touchstart') e.preventDefault();
    if(gameState === 'playing' && shark.vx === 0) { holding = true; holdStart = Date.now(); }
};
const eHold = () => {
    if(holding) {
        holding = false; playSfx(220, 450, 0.15, 0.2);
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        shark.vx = W*0.016 + p * (W*0.024); 
        shark.vy = -H*0.016 - p * (H*0.02);
    }
};

cv.addEventListener('touchstart', sHold, {passive:false});
window.addEventListener('touchend', eHold);
cv.addEventListener('mousedown', sHold);
window.addEventListener('mouseup', eHold);

const savedL = localStorage.getItem('shark_level') || 1;
document.getElementById('challenge-info').textContent = `当前进度：STAGE ${savedL}`;

draw();
</script>
</body>
</html>
