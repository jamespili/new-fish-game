<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海挑战 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #020509; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; position: fixed; width: 100%; }
        #gc { position: relative; width: 100%; height: 100%; background: #050a12; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 顶部 UI 加强 */
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.8s; }
        .stat { background: rgba(0, 136, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(0, 136, 255, 0.4); border-radius: 20px; padding: 8px 18px; font-size: 11px; color: #4db8ff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .stat span { color: #fff; font-weight: bold; margin-left: 5px; font-size: 15px; }

        /* 初始启动菜单 */
        #menu { position: absolute; inset: 0; background: #050a12; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #menu h1 { font-size: 38px; margin-bottom: 35px; text-shadow: 0 0 20px #0088ff; font-style: italic; letter-spacing: 2px; }
        .mode-btn { width: 250px; background: linear-gradient(135deg, rgba(0,136,255,0.3), rgba(0,68,187,0.3)); border: 1px solid rgba(0,136,255,0.5); padding: 22px; border-radius: 18px; margin: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .mode-btn:active { transform: scale(0.95); background: rgba(0,136,255,0.5); }
        .mode-btn h3 { font-size: 20px; margin-bottom: 5px; color: #fff; }
        .mode-btn p { font-size: 11px; color: #a0d2ff; }

        /* 结算/过关弹窗 */
        #msg { position: absolute; inset: 0; background: rgba(3,8,16,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; text-align: center; backdrop-filter: blur(10px); }
        #msg h2 { font-size: 32px; margin-bottom: 15px; background: linear-gradient(to bottom, #fff, #4db8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #msg button { background: linear-gradient(135deg, #0088ff, #0044bb); color: #fff; border: none; border-radius: 35px; padding: 18px 75px; font-size: 18px; font-weight: bold; margin-top: 25px; box-shadow: 0 5px 20px rgba(0,136,255,0.4); }
        
        #hint { position: absolute; bottom: 50px; width: 100%; text-align: center; color: rgba(77,184,255,0.4); font-size: 13px; letter-spacing: 2px; }
    </style>
</head>
<body>
<div id="gc">
    <div id="menu">
        <h1>SHARK ⚡️ DASH</h1>
        <div class="mode-btn" onclick="startMode('endless')">
            <h3>无尽模式</h3>
            <p>挑战极限深渊</p>
        </div>
        <div class="mode-btn" onclick="startMode('challenge')">
            <h3>挑战模式</h3>
            <p id="level-label">加载进度中...</p>
        </div>
    </div>

    <div id="ui">
        <div class="stat"><span id="mode-tag">ENDLESS</span></div>
        <div class="stat">SCORE <span id="sc">0</span></div>
        <div class="stat">BEST <span id="bs">0</span></div>
    </div>

    <canvas id="cv"></canvas>

    <div id="msg">
        <h2 id="mt">SHARK LOST</h2>
        <p id="mb">游戏结束</p>
        <button onclick="handleMsgBtn()">继续</button>
        <p onclick="location.reload()" style="margin-top:25px; font-size:14px; color:#666; cursor:pointer;">返回菜单</p>
    </div>
    
    <div id="hint">点触起跳 · 长按蓄力</div>
</div>

<script>
/**
 * ⚡️ 闪电鲨 v14 工业加固版
 */
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg'), mt = document.getElementById('mt'), mb = document.getElementById('mb');

let W, H, time = 0, gameState = 'menu', gameMode = 'endless';
let score = 0, best = 0, currentLevel = 1, targetScore = 0;
let holding = false, holdStart = 0;
let tanks = [], shark, particles = [], camX = 0, targetCamX = 0;

// 动态主题
const THEMES = [
    { r: [1, 10], bg: ['#020509', '#081326'], water: '#00ccff' },
    { r: [11, 20], bg: ['#010c0b', '#052a26'], water: '#00ffaa' },
    { r: [21, 30], bg: ['#0d0212', '#2a053d'], water: '#bb66ff' },
    { r: [31, 40], bg: ['#120202', '#3d0505'], water: '#ff4400' }
];

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function startMode(mode) {
    gameMode = mode;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui').style.opacity = '1';
    document.getElementById('mode-tag').textContent = mode.toUpperCase();
    
    if(mode === 'challenge') {
        currentLevel = parseInt(localStorage.getItem('shark_level')) || 1;
        targetScore = 3 + Math.floor(currentLevel/2);
    } else {
        best = localStorage.getItem('shark_best') || 0;
        bsEl.textContent = best;
    }
    
    gameState = 'playing';
    initGame();
}

function initGame() {
    score = 0; scEl.textContent = 0;
    const tankW = W * 0.25;
    tanks = [{ x: W * 0.12, y: H - (H * 0.13) - 120, w: tankW, h: H * 0.13, color: getTheme().water, offset: 0 }];
    for(let i=0; i<5; i++) spawnNext();
    shark = { x: tanks[0].x + tanks[0].w/2, y: tanks[0].y - 15, vx: 0, vy: 0, angle: 0, tail: 0 };
    camX = 0; targetCamX = 0; particles = [];
    msg.style.display = 'none';
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    let gap = W * (0.35 + Math.random() * 0.25);
    if(gameMode === 'challenge') gap += Math.min(currentLevel * 2, W * 0.2);
    
    let baseW = W * 0.25;
    if(gameMode === 'challenge') baseW -= Math.min(currentLevel * 1.5, baseW * 0.4);
    
    tanks.push({
        x: last.x + last.w + gap,
        y: H - (H * 0.13) - 120,
        w: Math.max(baseW, 55),
        h: H * 0.13,
        color: getTheme().water,
        offset: Math.random() * 50
    });
}

function getTheme() {
    const lv = gameMode === 'challenge' ? currentLevel : 1;
    return THEMES.find(t => lv >= t.r[0] && lv <= t.r[1]) || THEMES[0];
}

function handleMsgBtn() {
    if(mt.textContent === 'LEVEL CLEAR') {
        currentLevel++;
        localStorage.setItem('shark_level', currentLevel);
        startMode('challenge');
    } else {
        initGame();
        gameState = 'playing';
    }
}

function drawShark(x, y, ang, tail, isIdle) {
    cx.save();
    const swim = isIdle ? Math.sin(time*0.08)*4 : 0;
    cx.translate(x, y + swim); cx.rotate(ang);
    const theme = getTheme();
    
    // 鲨鱼光晕
    cx.shadowBlur = 15; cx.shadowColor = theme.water;
    const g = cx.createLinearGradient(-18, 0, 18, 0);
    g.addColorStop(0, '#1a75ff'); g.addColorStop(1, '#80b3ff');
    cx.fillStyle = g;
    
    // 身体
    cx.beginPath(); cx.ellipse(0, 0, 21, 10, 0, 0, Math.PI*2); cx.fill();
    // 鱼鳍
    cx.beginPath(); cx.moveTo(-2, -8); cx.quadraticCurveTo(3, -16, 11, -5); cx.fill();
    // 尾部摆动
    const tw = Math.sin(tail) * 6;
    cx.beginPath(); cx.moveTo(-16, 0); cx.lineTo(-29, -10+tw); cx.lineTo(-25, 0); cx.lineTo(-29, 10+tw); cx.fill();
    // 眼睛
    cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(11, -2, 2.5, 0, Math.PI*2); cx.fill();
    cx.restore();
}

function update() {
    if(gameState !== 'playing') return;
    time++;
    
    if(shark.vx !== 0 || shark.vy !== 0) {
        shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.48;
        shark.angle = Math.atan2(shark.vy, shark.vx);
        shark.tail += 0.45;
        targetCamX = Math.max(camX, shark.x - W * 0.35);

        tanks.forEach((t, i) => {
            if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y-10 && shark.y < t.y+30) {
                shark.y = t.y - 12; shark.vx = 0; shark.vy = 0; shark.angle = 0;
                for(let k=0; k<8; k++) particles.push({x:shark.x, y:t.y, vx:(Math.random()-0.5)*6, vy:-Math.random()*5, o:1});
                
                if(i > 0) {
                    score += i; scEl.textContent = score;
                    if(gameMode === 'endless') {
                        if(score > best) { best=score; bsEl.textContent=best; localStorage.setItem('shark_best', best); }
                    } else if(score >= targetScore) {
                        gameState = 'win'; mt.textContent = 'LEVEL CLEAR'; mb.textContent = `第 ${currentLevel} 关挑战成功！`; msg.style.display = 'flex';
                    }
                    tanks.splice(0, i); while(tanks.length<6) spawnNext();
                }
            }
        });
        
        if(shark.y > H + 50 || shark.x < camX - 100) {
            gameState = 'dead'; mt.textContent = 'SHARK LOST'; mb.textContent = `你在深海中迷失了...`; msg.style.display = 'flex';
        }
    } else { shark.tail += 0.08; }
    
    camX += (targetCamX - camX) * 0.1;
}

function render() {
    const theme = getTheme();
    const bgGrd = cx.createLinearGradient(0,0,0,H);
    bgGrd.addColorStop(0, theme.bg[0]); bgGrd.addColorStop(1, theme.bg[1]);
    cx.fillStyle = bgGrd; cx.fillRect(0,0,W,H);
    
    cx.save(); cx.translate(-camX, 0);
    
    tanks.forEach(t => {
        // 鱼缸边缘发光
        cx.strokeStyle = t.color; cx.lineWidth = 3; cx.shadowBlur = 12; cx.shadowColor = t.color;
        cx.strokeRect(t.x, t.y, t.w, t.h);
        
        // 内部流动水
        cx.save();
        cx.beginPath(); cx.rect(t.x, t.y, t.w, t.h); cx.clip();
        cx.fillStyle = 'rgba(255,255,255,0.12)';
        cx.beginPath(); cx.moveTo(t.x, t.y + t.h);
        for(let tx=0; tx<=t.w; tx+=6) {
            const ty = Math.sin(tx*0.06 + time*0.06 + t.offset) * 4;
            cx.lineTo(t.x + tx, t.y + 10 + ty);
        }
        cx.lineTo(t.x+t.w, t.y+t.h); cx.fill();
        cx.restore();
    });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.o -= 0.025;
        if(p.o <= 0) particles.splice(i, 1);
        cx.fillStyle = `rgba(255,255,255,${p.o})`;
        cx.beginPath(); cx.arc(p.x, p.y, 2.5, 0, Math.PI*2); cx.fill();
    });
    
    if(shark) drawShark(shark.x, shark.y, shark.angle, shark.tail, shark.vx===0);
    cx.restore();

    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        cx.fillStyle = theme.water; cx.fillRect(0, H-4, W*p, 4);
    }
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

// 事件
const hStart = (e) => {
    if(e.type==='touchstart') e.preventDefault();
    if(gameState==='playing' && shark.vx===0) { holding=true; holdStart=Date.now(); }
};
const hEnd = () => {
    if(holding) {
        holding=false;
        const p = Math.min((Date.now()-holdStart)/1400, 1);
        shark.vx = W*0.018 + p * (W*0.035);
        shark.vy = -H*0.015 - p * (H*0.02);
    }
};

cv.addEventListener('touchstart', hStart, {passive:false});
window.addEventListener('touchend', hEnd);
cv.addEventListener('mousedown', hStart);
window.addEventListener('mouseup', hEnd);

// 初始化
const savedL = localStorage.getItem('shark_level') || 1;
document.getElementById('level-label').textContent = `进度：第 ${savedL} 关`;

loop();
</script>
</body>
</html>
