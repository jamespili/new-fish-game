<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>闪电鲨：深海挑战 ⚡️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #010408; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; position: fixed; width: 100%; }
        #gc { position: relative; width: 100%; height: 100%; background: #050a12; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 50px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 10px; pointer-events: none; z-index: 10; opacity: 0; }
        .stat { background: rgba(0, 136, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(0, 136, 255, 0.3); border-radius: 20px; padding: 7px 18px; font-size: 11px; color: #4db8ff; }
        #music-toggle { pointer-events: all; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        #menu { position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(8, 20, 45, 1) 0%, rgba(2, 5, 12, 1) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #menu.hide { display: none; }
        #menu h1 { font-size: 42px; margin-bottom: 5px; text-shadow: 0 0 30px #0088ff; font-style: italic; font-weight: 900; letter-spacing: 4px; }
        .mode-btn { width: 260px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,136,255,0.4); padding: 22px; border-radius: 20px; margin: 12px; text-align: center; }
        #msg { position: absolute; inset: 0; background: rgba(2, 5, 12, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; text-align: center; }
        #msg button { background: linear-gradient(135deg, #0088ff 0%, #0044bb 100%); color: #fff; border: none; border-radius: 40px; padding: 18px 80px; font-size: 18px; font-weight: 800; margin-top: 25px; }
    </style>
</head>
<body>
<div id="gc">
    <div id="menu">
        <h1>SHARK ⚡️ DASH</h1>
        <div style="font-size: 12px; color: #4db8ff; letter-spacing: 6px; margin-bottom: 50px; opacity: 0.8;">Deep Sea Adventure</div>
        <div class="mode-btn" onclick="startMode('endless')"><h3>无尽模式</h3><p>挑战极致纪录</p></div>
        <div class="mode-btn" onclick="startMode('challenge')"><h3>挑战模式</h3><p id="challenge-info">加载进度中...</p></div>
    </div>
    <div id="ui">
        <div id="music-toggle" onclick="toggleMusic()">🔊</div>
        <div class="stat">DEPTH<span id="sc" style="color:#fff;margin-left:5px;font-weight:bold;">0</span></div>
        <div class="stat">BEST<span id="bs" style="color:#fff;margin-left:5px;font-weight:bold;">0</span></div>
    </div>
    <canvas id="cv"></canvas>
    <div id="msg">
        <h2 id="mt" style="font-size:30px;margin-bottom:10px;">SHARK LOST</h2>
        <p id="mb" style="color:#7aafd4;">迷失在深渊...</p>
        <button onclick="handleMsgBtn()">继续挑战</button>
        <div style="margin-top: 30px; font-size: 14px; color: #444;" onclick="location.reload()">返回菜单</div>
    </div>
</div>

<script>
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const scEl = document.getElementById('sc'), bsEl = document.getElementById('bs'), msg = document.getElementById('msg'), mt = document.getElementById('mt'), mb = document.getElementById('mb');

let W, H, time = 0, gameState = 'menu', gameMode = 'endless', score = 0, best = 0, currentLevel = 1, targetScore = 0;
let holding = false, holdStart = 0, tanks = [], shark, particles = [], camX = 0, targetCamX = 0;
let audioCtx, musicGain, isMusicOn = true;

function initAudio() {
    try {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain(); musicGain.gain.value = 0.12;
            musicGain.connect(audioCtx.destination);
            const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.setValueAtTime(55, audioCtx.currentTime);
            osc.connect(musicGain); osc.start();
        }
    } catch(e) {}
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

function makeTank(x) {
    const w = W * 0.24, h = H * 0.12;
    return { x, y: H - h - 120, w, h, color: '#00ccff', offset: Math.random()*50 };
}

function startMode(mode) {
    initAudio();
    gameMode = mode;
    document.getElementById('menu').classList.add('hide');
    document.getElementById('ui').style.opacity = '1';
    if(mode === 'challenge') {
        currentLevel = parseInt(localStorage.getItem('shark_level')) || 1;
        targetScore = 3 + Math.floor(currentLevel/2);
    } else {
        best = localStorage.getItem('shark_best') || 0; bsEl.textContent = best;
    }
    gameState = 'playing'; initGame();
}

function initGame() {
    score = 0; scEl.textContent = 0;
    tanks = [makeTank(W * 0.15)]; for(let i=0; i<4; i++) spawnNext();
    shark = { x: tanks[0].x + tanks[0].w/2, y: tanks[0].y - 15, vx: 0, vy: 0, ang: 0, tail: 0 };
    camX = 0; targetCamX = 0; particles = []; msg.style.display = 'none';
}

function spawnNext() {
    const last = tanks[tanks.length-1];
    const gap = W * (0.35 + Math.random() * 0.25);
    tanks.push(makeTank(last.x + last.w + gap));
}

function draw() {
    time++;
    cx.fillStyle = '#050a12'; cx.fillRect(0,0,W,H);
    if(gameState === 'playing') {
        if(shark.vx !== 0 || shark.vy !== 0) {
            shark.x += shark.vx; shark.y += shark.vy; shark.vy += 0.55;
            shark.ang = Math.atan2(shark.vy, shark.vx); shark.tail += 0.45;
            targetCamX = Math.max(camX, shark.x - W * 0.35);
            tanks.forEach((t, i) => {
                if(shark.vy > 0 && shark.x > t.x && shark.x < t.x+t.w && shark.y > t.y-15 && shark.y < t.y+30) {
                    shark.y = t.y - 12; shark.vx = 0; shark.vy = 0; shark.ang = 0;
                    if(i > 0) {
                        score += i; scEl.textContent = score;
                        if(gameMode === 'endless') { if(score>best){best=score; bsEl.textContent=best; localStorage.setItem('shark_best',best);}}
                        else if(score>=targetScore){gameState='win'; mt.textContent='LEVEL CLEAR'; msg.style.display='flex';}
                        tanks.splice(0, i); while(tanks.length<5) spawnNext();
                    }
                }
            });
            if(shark.y > H + 80 || shark.x < camX - 100) { gameState = 'dead'; msg.style.display = 'flex'; }
        } else { shark.tail += 0.08; }
        camX += (targetCamX - camX) * 0.1;
    }
    cx.save(); cx.translate(-camX, 0);
    tanks.forEach(t => {
        cx.strokeStyle = t.color; cx.lineWidth = 3; cx.strokeRect(t.x, t.y, t.w, t.h);
        cx.fillStyle = 'rgba(0,204,255,0.1)'; cx.fillRect(t.x, t.y+5, t.w, t.h-5);
    });
    // 简易鲨鱼绘制
    cx.fillStyle = '#1a75ff'; cx.beginPath(); cx.ellipse(shark.x, shark.y + (shark.vx===0?Math.sin(time*0.1)*3:0), 20, 9, shark.ang, 0, Math.PI*2); cx.fill();
    cx.restore();
    if(holding) {
        const p = Math.min((Date.now()-holdStart)/1200, 1);
        cx.fillStyle = '#00ccff'; cx.fillRect(0, H-5, W*p, 5);
    }
    requestAnimationFrame(draw);
}

cv.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(gameState === 'playing' && shark.vx === 0) { holding = true; holdStart = Date.now(); }
}, {passive:false});

window.addEventListener('touchend', () => {
    if(holding) {
        holding = false;
        const ratio = Math.min((Date.now() - holdStart) / 1200, 1);
        // 核心修正：绝对保底速度，哪怕轻点一下也强制跃起
        shark.vx = W * 0.02 + ratio * (W * 0.035); 
        shark.vy = -H * 0.016 - ratio * (H * 0.02); 
        gameState = 'flying';
    }
});

function handleMsgBtn() { initGame(); gameState = 'playing'; }
function toggleMusic() { isMusicOn = !isMusicOn; if(musicGain) musicGain.gain.value = isMusicOn?0.12:0; }
initGame(); draw();
</script>
</body>
</html>
